# Redis configuration for RAG system
# Optimized for queue processing and caching

# Network
bind 0.0.0.0
port 6379
protected-mode no

# General
daemonize no
supervised no
loglevel notice
logfile ""

# Persistence - Balanced approach for queue reliability
save 900 1
save 300 10
save 60 10000

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Queue-optimized settings
timeout 0
tcp-keepalive 300
tcp-backlog 511

# Disable some features we don't need
# save ""  # Uncomment to disable persistence entirely (faster, less reliable)

# Append-only file (AOF) - Better for queue reliability
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Security (basic)
# requirepass your_password_here  # Uncomment and set password for production

# Disable dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command EVAL ""

# Performance tuning
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Latency monitoring
latency-monitor-threshold 100

# Notifications (useful for queue monitoring)
notify-keyspace-events Ex

# Development settings (remove in production)
stop-writes-on-bgsave-error no
