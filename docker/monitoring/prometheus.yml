global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Rules for alerting (can be extended)
rule_files:
  # - "alert_rules.yml"

# Scrape configuration
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # RAG API service
  - job_name: 'rag-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Redis metrics (if redis_exporter is added later)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Worker metrics (when we add them)
  - job_name: 'rag-worker'
    static_configs:
      - targets: ['worker:8001']  # We'll add metrics endpoint
    metrics_path: '/metrics'
    scrape_interval: 15s

  # FAISS service (when we add it)
  - job_name: 'rag-faiss'
    static_configs:
      - targets: ['faiss-service:6333']
    metrics_path: '/metrics'
    scrape_interval: 15s

# Alerting configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Storage configuration
storage:
  tsdb:
    retention.time: 30d
    retention.size: 10GB
