services:
  db:
    image: postgres:15
    container_name: jellychat_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile.dev
    container_name: jellychat_web
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: ["./docker/web/entrypoint.sh"]

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile.dev
    container_name: jellychat_worker
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
      vectordb:
        condition: service_healthy
    volumes:
      - .:/app
    env_file:
      - .env
    command: ["./docker/worker/entrypoint.sh"]

  ollama:
    image: ollama/ollama
    container_name: jellychat_ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "12434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12434"]
      interval: 10s
      retries: 5

  vectordb:
    build:
      context: .
      dockerfile: docker/vectordb/Dockerfile
    container_name: jellychat_vectordb
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestor:
    build:
      context: .
      dockerfile: docker/ingestor/Dockerfile.dev
    container_name: jellychat_ingestor
    depends_on:
      db:
        condition: service_healthy
      vectordb:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - .:/app
    env_file:
      - .env
    command: ["./docker/ingestor/entrypoint.sh"]

volumes:
  pgdata:
  ollama-models:
  qdrant_data:
