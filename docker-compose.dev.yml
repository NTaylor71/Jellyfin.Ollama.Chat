services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  ollama:
    image: ollama/ollama
    container_name: ollama
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      - ENV=docker
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - NVIDIA_VISIBLE_DEVICES=all
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./docker/ollama/entrypoint.sh:/entrypoint.sh:ro
      - ./docker/ollama/healthcheck.sh:/healthcheck.sh:ro
      - ollama-models:/root/.ollama
    ports:
      - "12434:11434"
    healthcheck:
      test: ["CMD", "/bin/sh", "/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 120
    depends_on:
      redis:
        condition: service_healthy

  faiss_service:
    build:
      context: .
      dockerfile: docker/faiss_service/Dockerfile
    container_name: faiss_service
    ports:
      - "6333:6333"
    volumes:
      - ./docker/faiss_service/healthcheck.sh:/healthcheck.sh:ro
    healthcheck:
      test: ["CMD", "/bin/bash", "/healthcheck.sh"]
      interval: 2s
      timeout: 2s
      retries: 30
    environment:
      - ENV=docker
      - VECTORDB_URL=http://faiss_service:6333
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./docker/wait_for_services.sh:/wait_for_services.sh:ro
    depends_on:
      faiss_service:
        condition: service_healthy
    environment:
      - ENV=docker
      - VECTORDB_URL=http://faiss_service:6333
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_HOST=redis
    env_file:
      - .env
    entrypoint: ["/bin/bash", "/app/docker/api/entrypoint.sh"]

  redis_queue_worker:
    build:
      context: .
      dockerfile: docker/redis_queue_worker/Dockerfile
    container_name: redis_queue_worker
    depends_on:
      faiss_service:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - .:/app
      - ./docker/wait_for_services.sh:/wait_for_services.sh:ro
    environment:
      - ENV=docker
      - VECTORDB_URL=http://faiss_service:6333
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_HOST=redis
    env_file:
      - .env
    entrypoint: ["./docker/redis_queue_worker/entrypoint.sh"]

  gpu_queue_worker:
    build:
      context: .
      dockerfile: docker/gpu_queue_worker/Dockerfile
    container_name: gpu_queue_worker
    depends_on:
      faiss_service:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - .:/app
      - ./docker/wait_for_services.sh:/wait_for_services.sh:ro
    environment:
      - ENV=docker
      - VECTORDB_URL=http://faiss_service:6333
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_HOST=redis
    env_file:
      - .env
    entrypoint: ["./docker/gpu_queue_worker/entrypoint.sh"]

  faiss_ingestor:
    build:
      context: .
      dockerfile: docker/faiss_ingestor/Dockerfile
    container_name: faiss_ingestor
    depends_on:
      faiss_service:
        condition: service_healthy
    volumes:
      - .:/app
      - ./docker/wait_for_services.sh:/wait_for_services.sh:ro
    environment:
      - ENV=docker
      - VECTORDB_URL=http://faiss_service:6333
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_HOST=redis
    env_file:
      - .env
    entrypoint: ["./docker/faiss_ingestor/entrypoint.sh"]

volumes:
  ollama-models:
