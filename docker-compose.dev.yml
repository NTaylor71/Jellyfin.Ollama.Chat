services:
  redis:
    image: redis:7-alpine
    container_name: jellychat_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile.dev
    container_name: jellychat_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_started
      ollama:
        condition: service_healthy
    env_file:
      - .env
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile.dev
    container_name: jellychat_worker
    depends_on:
      redis:
        condition: service_started
      ollama:
        condition: service_healthy
      vectordb:
        condition: service_healthy
    volumes:
      - .:/app
    env_file:
      - .env
    command: ["./docker/worker/entrypoint.sh"]

  ollama:
    image: ollama/ollama
    container_name: jellychat_ollama
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - NVIDIA_VISIBLE_DEVICES=all
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./docker/ollama/entrypoint.sh:/entrypoint.sh:ro
      - ./docker/ollama/healthcheck.sh:/healthcheck.sh:ro
      - ollama-models:/root/.ollama
    ports:
      - "12434:11434"
    healthcheck:
      test: ["CMD", "/bin/sh", "/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 120
      
  vectordb:
    build:
      context: .
      dockerfile: docker/vectordb/Dockerfile
    container_name: jellychat_vectordb
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      ollama:
        condition: service_healthy

  ingestor:
    build:
      context: .
      dockerfile: docker/ingestor/Dockerfile.dev
    container_name: jellychat_ingestor
    depends_on:
      redis:
        condition: service_started
      vectordb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - .:/app
    env_file:
      - .env
    command: ["./docker/ingestor/entrypoint.sh"]

volumes:
  ollama-models:
  qdrant_data:
