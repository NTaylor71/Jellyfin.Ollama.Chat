services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  ollama_embed:
    image: ollama/ollama
    container_name: ollama_embed
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      - ENV=docker
      - OLLAMA_MODEL=${OLLAMA_EMBED_MODEL}
      - OLLAMA_KEEP_ALIVE=5m
      - NVIDIA_VISIBLE_DEVICES=""
      - CUDA_VISIBLE_DEVICES=""
    env_file:
      - .env
    volumes:
      - ./docker/ollama_embed/entrypoint.sh:/entrypoint.sh:ro
      - ./docker/ollama_embed/healthcheck.sh:/healthcheck.sh:ro
      - ollama-embed-models:/root/.ollama
    ports:
      - "12435:11434"
    healthcheck:
      test: ["CMD", "/bin/sh", "/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 120
    depends_on:
      redis:
        condition: service_healthy

  ollama_chat:
    image: ollama/ollama
    container_name: ollama_chat
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      - ENV=docker
      - OLLAMA_MODEL=${OLLAMA_CHAT_MODEL}
      - OLLAMA_KEEP_ALIVE=5m
      - NVIDIA_VISIBLE_DEVICES=all
    env_file:
      - .env
    volumes:
      - ./docker/ollama_chat/entrypoint.sh:/entrypoint.sh:ro
      - ./docker/ollama_chat/healthcheck.sh:/healthcheck.sh:ro
      - ollama-chat-models:/root/.ollama
    ports:
      - "12434:11434"
    healthcheck:
      test: ["CMD", "/bin/sh", "/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 120
    depends_on:
      redis:
        condition: service_healthy

  faiss_service:
    build:
      context: .
      dockerfile: docker/faiss_service/Dockerfile
    container_name: faiss_service
    ports:
      - "6333:6333"
    volumes:
      - ./docker/faiss_service/healthcheck.sh:/healthcheck.sh:ro
    healthcheck:
      test: ["CMD", "/bin/bash", "/healthcheck.sh"]
      interval: 2s
      timeout: 2s
      retries: 30
    environment:
      - ENV=docker
      - VECTORDB_URL=http://faiss_service:6333
      - OLLAMA_EMBED_BASE_URL=http://ollama_embed:11434
    depends_on:
      ollama_embed:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./docker/wait_for_services.sh:/wait_for_services.sh:ro
    depends_on:
      faiss_service:
        condition: service_healthy
    environment:
      - ENV=docker
      - VECTORDB_URL=http://faiss_service:6333
      - OLLAMA_EMBED_BASE_URL=http://ollama_embed:11434
      - OLLAMA_CHAT_BASE_URL=http://ollama_chat:11434
      - REDIS_HOST=redis
    env_file:
      - .env
    entrypoint: ["/bin/bash", "/app/docker/api/entrypoint.sh"]

  gpu_queue_worker:
    build:
      context: .
      dockerfile: docker/gpu_queue_worker/Dockerfile
    container_name: gpu_queue_worker
    depends_on:
      faiss_service:
        condition: service_healthy
      ollama_embed:
        condition: service_healthy
      ollama_chat:
        condition: service_healthy
    volumes:
      - .:/app
      - ./docker/wait_for_services.sh:/wait_for_services.sh:ro
    environment:
      - ENV=docker
      - VECTORDB_URL=http://faiss_service:6333
      - OLLAMA_EMBED_BASE_URL=http://ollama_embed:11434
      - OLLAMA_CHAT_BASE_URL=http://ollama_chat:11434
      - REDIS_HOST=redis
    env_file:
      - .env
    entrypoint: ["./docker/gpu_queue_worker/entrypoint.sh"]

  faiss_ingestor:
    build:
      context: .
      dockerfile: docker/faiss_ingestor/Dockerfile
    container_name: faiss_ingestor
    depends_on:
      faiss_service:
        condition: service_healthy
      ollama_embed:
        condition: service_healthy
    volumes:
      - .:/app
      - ./docker/wait_for_services.sh:/wait_for_services.sh:ro
    environment:
      - ENV=docker
      - VECTORDB_URL=http://faiss_service:6333
      - OLLAMA_EMBED_BASE_URL=http://ollama_embed:11434
      - REDIS_HOST=redis
    env_file:
      - .env
    entrypoint: ["./docker/faiss_ingestor/entrypoint.sh"]

volumes:
  ollama-embed-models:
  ollama-chat-models:
